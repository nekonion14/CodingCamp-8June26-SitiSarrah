<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>Expense & Budget Visualizer</h1>
        <button id="theme-toggle" class="btn-secondary">🌙 Dark Mode</button>
    </header>

    <main class="container">
        <section class="card balance-card">
            <h2>TOTAL BALANCE</h2>
            <div id="total-balance" class="balance-amount">$0.00</div>
            
            <div class="limit-setting">
                <label for="budget-limit">Set Spending Alert Limit ($):</label>
                <input type="number" id="budget-limit" placeholder="e.g. 100" min="0">
            </div>
            <div id="limit-alert" class="alert-message hidden">⚠️ Warning: Your total expenses have exceeded your set limit!</div>
        </section>

        <div class="main-grid">
            <section class="card form-section">
                <h3>Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="e.g. Cilok" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Transaction</button>
                </form>
            </section>

            <section class="card chart-section">
                <h3>Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="spending-chart"></canvas>
                </div>
            </section>

            <section class="card list-section">
                <div class="list-header">
                    <h3>Daftar Transactions</h3>
                    <div class="sort-container">
                        <label for="sort-options">Sort by:</label>
                        <select id="sort-options">
                            <option value="latest">Latest</option>
                            <option value="amount-high">Amount: High to Low</option>
                            <option value="amount-low">Amount: Low to High</option>
                            <option value="category">Category</option>
                        </select>
                    </div>
                </div>
                
                <div id="transaction-list" class="scrollable-list">
                    </div>
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
